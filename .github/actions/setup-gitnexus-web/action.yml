name: Setup P4Nexus Web
description: Setup Node.js 20.19+ (vite 7 floor), build p4nexus-shared, install web dependencies

runs:
  using: composite
  steps:
    - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
      with:
        # Vite 7 requires Node ^20.19.0 || >=22.12.0 (require(esm) support).
        # Pin explicitly so we don't depend on the floating "20" alias resolving
        # to a high enough patch version on every runner image.
        node-version: '20.19.0'
        cache: npm
        cache-dependency-path: p4nexus-web/package-lock.json

    - name: Build p4nexus-shared
      run: npm install && npm run build
      shell: bash
      working-directory: p4nexus-shared

    - name: Install web dependencies
      run: npm ci
      shell: bash
      working-directory: p4nexus-web

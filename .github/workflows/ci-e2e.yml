name: E2E Tests

on:
  workflow_call:

jobs:
  check-changes:
    name: Check web module changes
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      web_changed: ${{ steps.filter.outputs.web }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v3
        id: filter
        with:
          filters: |
            web:
              - 'p4nexus-web/**'

  e2e:
    name: e2e (chromium)
    needs: check-changes
    if: needs.check-changes.result == 'success' && needs.check-changes.outputs.web_changed == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Configure e2e P4Nexus home
        run: echo "P4NEXUS_HOME=${RUNNER_TEMP}/p4nexus-home" >> "$GITHUB_ENV"

      - uses: ./.github/actions/setup-p4nexus-web

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        working-directory: p4nexus-web

      - name: Install backend dependencies
        run: npm ci
        working-directory: p4nexus

      - name: Build backend
        run: npm run build
        working-directory: p4nexus

      - name: Analyze repository (index for backend)
        run: |
          E2E_REPO="${RUNNER_TEMP}/p4nexus-e2e-repo"
          rm -rf "${E2E_REPO}"
          mkdir -p "${E2E_REPO}"
          cp -R p4nexus/test/fixtures/mini-repo/src "${E2E_REPO}/src"
          printf '%s\n' '{"name":"e2e-mini-repo","version":"0.0.0","private":true}' > "${E2E_REPO}/package.json"
          node p4nexus/dist/cli/index.js analyze "${E2E_REPO}" --skip-git --skip-agents-md --name e2e-mini-repo
          if [ ! -d "${E2E_REPO}/.p4nexus" ]; then
            echo "::error::No fixture .p4nexus index created"
            exit 1
          fi

      - name: Start backend server
        run: node dist/cli/index.js serve &
        working-directory: p4nexus

      - name: Wait for backend readiness
        run: npx wait-on http://localhost:4747/api/repos --timeout 30000
        working-directory: p4nexus-web

      - name: Start Vite dev server
        run: npm run dev &
        working-directory: p4nexus-web

      - name: Wait for Vite dev server
        run: npx wait-on http://localhost:5173 --timeout 30000
        working-directory: p4nexus-web

      - name: Run E2E tests
        run: npx playwright test
        working-directory: p4nexus-web
        env:
          E2E: '1'

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: e2e-results
          path: |
            p4nexus-web/test-results/
            p4nexus-web/playwright-report/
          retention-days: 5

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install shared package
        working-directory: p4nexus-shared
        run: npm install

      - name: Build shared package
        working-directory: p4nexus-shared
        run: npx tsc

      - name: Install main package
        working-directory: p4nexus
        run: npm install

      - name: Type check
        working-directory: p4nexus
        run: npx tsc --noEmit

      - name: Build
        working-directory: p4nexus
        run: npx tsc

      - name: Verify CLI runs
        working-directory: p4nexus
        run: node dist/cli/index.js --version
